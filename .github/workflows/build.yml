name: Build ApkSignatureKillerEx

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          SDK_ROOT="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=" >> $GITHUB_ENV

          # List what's already available
          echo "=== Pre-installed ==="
          ls "$SDK_ROOT/platforms/" 2>/dev/null || echo "no platforms"
          ls "$SDK_ROOT/build-tools/" 2>/dev/null || echo "no build-tools"
          ls "$SDK_ROOT/ndk/" 2>/dev/null || echo "no ndk"
          ls "$SDK_ROOT/cmake/" 2>/dev/null || echo "no cmake"

      - name: Install project dependencies
        run: |
          SDK_ROOT="/usr/local/lib/android/sdk"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          # Install only what's missing
          $SDKMANAGER --list 2>/dev/null | grep -E "android-32|ndk;24|build-tools;33" || true

          yes | $SDKMANAGER \
            "platforms;android-32" \
            "build-tools;33.0.2" \
            "ndk;24.0.8215888" \
            "cmake;3.22.1" 2>&1 | tail -5

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ApkSignatureKillerEx
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
