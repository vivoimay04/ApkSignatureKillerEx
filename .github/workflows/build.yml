name: Build ApkSignatureKillerEx

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          SDK_ROOT="/usr/local/lib/android/sdk"

          # Use local.properties so AGP doesn't fight with env vars
          echo "sdk.dir=$SDK_ROOT" > local.properties
          echo "ndk.dir=$SDK_ROOT/ndk/24.0.8215888" >> local.properties

          # Show what's available
          echo "=== SDK ==="
          ls "$SDK_ROOT/platforms/" 2>/dev/null || echo "no platforms"
          ls "$SDK_ROOT/build-tools/" 2>/dev/null || echo "no build-tools"
          ls "$SDK_ROOT/ndk/" 2>/dev/null || echo "no ndk"

      - name: Install NDK
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "ndk;24.0.8215888" "cmake;3.22.1" 2>&1 | tail -3

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ApkSignatureKillerEx
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
