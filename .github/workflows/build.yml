name: Build ApkSignatureKillerEx (test-dobby-hook)

on:
  push:
    branches: [ test-dobby-hook ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          SDK_ROOT="/usr/local/lib/android/sdk"
          echo "sdk.dir=$SDK_ROOT" > local.properties
          ls "$SDK_ROOT/platforms/" 2>/dev/null || echo "no platforms"

      - name: Install NDK + deps
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "ndk;24.0.8215888" "cmake;3.22.1" \
            "platforms;android-32" "build-tools;33.0.2" 2>&1 | tail -3

      - name: Patch release signing
        run: |
          echo '' >> app/build.gradle
          echo 'android.buildTypes.release.signingConfig android.signingConfigs.debug' >> app/build.gradle

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ApkSignatureKillerEx-dobby
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
